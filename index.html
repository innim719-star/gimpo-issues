<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KMP ISSUE | 김포 이슈 현황판</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f5f6fa; color: #1a1a2e; font-size: 14px; }

    /* ── 상단 헤더 ── */
    .top-bar {
      background: #1b2040;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
    }
    .top-row {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-area { display: flex; align-items: baseline; gap: 4px; }
    .logo-text {
      color: white;
      font-size: 22px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.5px;
      font-family: Arial Black, Arial, sans-serif;
    }
    .logo-wms {
      color: #8892b8;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      font-style: normal;
      margin-left: 2px;
    }

    .top-right { display: flex; align-items: center; gap: 12px; }
    .chip {
      background: #252b4a;
      border: 1px solid #2e3660;
      border-radius: 5px;
      padding: 5px 12px;
      color: #a0a8cc;
      font-size: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── 탭 네비 (헤더 안에 포함) ── */
    .nav-bar {
      display: flex;
      gap: 0;
      padding: 0;
    }
    .nav-tab {
      padding: 11px 18px;
      font-size: 13px;
      color: #7a84aa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      user-select: none;
      transition: color 0.15s;
    }
    .nav-tab:hover { color: #c0c8e8; }
    .nav-tab.active { color: white; font-weight: 600; border-bottom-color: white; }

    /* ── 콘텐츠 ── */
    .content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; }

    .section-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }

    /* ── 현황 카드 ── */
    .cards-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat-card {
      background: white;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 18px 22px;
      flex: 1;
      min-width: 130px;
    }
    .stat-card .s-label { font-size: 12px; color: #9ca3af; margin-bottom: 10px; }
    .stat-card .s-value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .stat-card.accent .s-value { color: #7c6ff7; }
    .stat-card.red .s-value { color: #ef4444; }
    .stat-card.orange .s-value { color: #f97316; }
    .stat-card.blue .s-value { color: #3b82f6; }
    .stat-card.green .s-value { color: #10b981; }

    /* ── 테이블 ── */
    .table-box {
      background: white;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .table-box-header {
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .table-box-header .t-title { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .table-box-header .t-count { font-size: 12px; color: #7c6ff7; font-weight: 600; margin-left: 6px; }
    .search-input {
      border: 1px solid #e8eaed;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      outline: none;
      color: #1a1a2e;
      width: 200px;
    }
    .search-input:focus { border-color: #7c6ff7; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: #f9fafb;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: #6b7280;
      font-size: 12px;
      white-space: nowrap;
      border-bottom: 1px solid #f0f0f0;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f5f6fa;
      color: #374151;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-gen   { background: #fee2e2; color: #dc2626; }
    .badge-wait  { background: #ffedd5; color: #ea580c; }
    .badge-done  { background: #d1fae5; color: #059669; }
    .badge-cancel{ background: #f3f4f6; color: #6b7280; }
    .badge-boss  { background: #ede9fe; color: #7c3aed; }

    /* ── 처리기간 카드 ── */
    .proc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .proc-card {
      background: white;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 16px 18px;
    }
    .proc-card .pc-title {
      font-size: 12px; font-weight: 600;
      color: #6b7280; margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 1px solid #f0f0f0;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .pc-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
    .pc-row .k { color: #9ca3af; }
    .pc-row .v { font-weight: 600; color: #1a1a2e; }

    /* ── 바 차트 ── */
    .bar-list { padding: 16px 20px; }
    .bar-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-loc { width: 120px; text-align: right; font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: #f3f4f6; border-radius: 4px; height: 20px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #7c6ff7, #a78bfa); border-radius: 4px; }
    .bar-cnt { min-width: 40px; font-size: 12px; font-weight: 600; color: #374151; }

    .no-data { padding: 40px; text-align: center; color: #c0c8d0; font-size: 13px; }
    .notice-box {
      background: #f5f3ff;
      border: 1px solid #ddd6fe;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 13px;
      color: #5b21b6;
      margin-bottom: 16px;
    }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-left: 4px solid #ef4444;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 13px;
      color: #b91c1c;
      margin-top: 20px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- 상단 헤더 + 탭 네비 통합 -->
<div class="top-bar">
  <div class="top-row">
    <div class="logo-area">
      <span class="logo-text">KMP</span>
      <span class="logo-wms">ISSUE</span>
    </div>
    <div class="top-right">
      <div class="chip">&#128197; <span id="header-date">로딩 중...</span></div>
      <div class="chip">KR_ARGO 김포</div>
    </div>
  </div>
  <div class="nav-bar">
    <div class="nav-tab active" onclick="showTab(0)">현황요약</div>
    <div class="nav-tab" onclick="showTab(1)">분실이슈</div>
    <div class="nav-tab" onclick="showTab(2)">파손이슈</div>
    <div class="nav-tab" onclick="showTab(3)">처리기간분석</div>
    <div class="nav-tab" onclick="showTab(4)">이슈취소 분석</div>
  </div>
</div>

<div class="content">

  <!-- 0: 현황요약 -->
  <div class="section active" id="section-0">
    <div class="section-title">분실이슈 현황</div>
    <div class="cards-row">
      <div class="stat-card red">
        <div class="s-label">이슈생성</div>
        <div class="s-value" id="s-loss-gen">-</div>
      </div>
      <div class="stat-card orange">
        <div class="s-label">이슈대기</div>
        <div class="s-value" id="s-loss-wait">-</div>
      </div>
      <div class="stat-card accent">
        <div class="s-label">합계</div>
        <div class="s-value" id="s-loss-total">-</div>
      </div>
    </div>
    <div class="section-title">파손이슈 현황</div>
    <div class="cards-row">
      <div class="stat-card blue">
        <div class="s-label">이슈생성</div>
        <div class="s-value" id="s-dmg-gen">-</div>
      </div>
      <div class="stat-card green">
        <div class="s-label">이슈대기</div>
        <div class="s-value" id="s-dmg-wait">-</div>
      </div>
      <div class="stat-card accent">
        <div class="s-label">합계</div>
        <div class="s-value" id="s-dmg-total">-</div>
      </div>
    </div>

    <div class="section-title">TOP LOC 20</div>
    <div class="table-box">
      <div class="table-box-header">
        <div><span class="t-title" id="loc-title">TOP LOC 20</span></div>
      </div>
      <div class="bar-list" id="loc-bars"></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>순위</th><th>로케이션</th><th>이슈건수</th><th>주요 SKU</th></tr></thead>
          <tbody id="loc-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 1: 분실이슈 -->
  <div class="section" id="section-1">
    <div class="table-box">
      <div class="table-box-header">
        <div><span class="t-title">분실이슈 (이슈생성 + 대기)</span><span class="t-count" id="loss-count"></span></div>
        <input class="search-input" type="text" placeholder="&#128269; 검색..." oninput="filterTable('loss-tbody', this.value)">
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>이슈번호</th><th>상태</th><th>D+</th><th>생성일시</th>
            <th>작업유형</th><th>벤더</th><th>이슈로케이션</th><th>SKU명</th><th>이슈수량</th>
          </tr></thead>
          <tbody id="loss-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 2: 파손이슈 -->
  <div class="section" id="section-2">
    <div class="table-box">
      <div class="table-box-header">
        <div><span class="t-title">파손이슈 (이슈생성 + 대기)</span><span class="t-count" id="dmg-count"></span></div>
        <input class="search-input" type="text" placeholder="&#128269; 검색..." oninput="filterTable('dmg-tbody', this.value)">
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>이슈번호</th><th>상태</th><th>D+</th><th>생성일시</th>
            <th>작업유형</th><th>벤더</th><th>이슈로케이션</th><th>SKU명</th><th>이슈수량</th>
          </tr></thead>
          <tbody id="dmg-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 3: 처리기간분석 -->
  <div class="section" id="section-3">
    <div class="proc-grid" id="process-stat-cards"></div>
    <div class="table-box">
      <div class="table-box-header">
        <div><span class="t-title" id="process-title">처리기간 분석</span></div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>상태</th><th>건수</th><th>평균 D+</th><th>최소 D+</th><th>최대 D+</th></tr></thead>
          <tbody id="process-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 4: 이슈생성자추적 -->
  <div class="section" id="section-4">
    <div id="cancel-content"></div>
  </div>


</div>

<script>
function showTab(idx) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
}

function filterTable(tbodyId, q) {
  const lq = q.toLowerCase();
  document.querySelectorAll('#' + tbodyId + ' tr').forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(lq) ? '' : 'none';
  });
}

function badge(s) {
  const m = { '이슈생성': 'badge-gen', '이슈대기': 'badge-wait', '이슈해결': 'badge-done', '이슈취소': 'badge-cancel' };
  return `<span class="badge ${m[s] || ''}">${s}</span>`;
}

function renderIssues(rows, tbodyId) {
  const tbody = document.getElementById(tbodyId);
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="9" class="no-data">데이터 없음</td></tr>'; return; }
  tbody.innerHTML = rows.map(r => `<tr>
    <td>${r.이슈번호 || ''}</td>
    <td>${badge(r.상태)}</td>
    <td><b>${r['D+'] != null ? r['D+'] : '-'}</b></td>
    <td>${r.생성일시 || '-'}</td>
    <td>${r.작업유형 || '-'}</td>
    <td>${r.벤더 || '-'}</td>
    <td>${r.이슈로케이션 || '-'}</td>
    <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis" title="${r.SKU명 || ''}">${r.SKU명 || '-'}</td>
    <td>${r.이슈수량 != null ? r.이슈수량 : '-'}</td>
  </tr>`).join('');
}

fetch('data.json?' + Date.now())
  .then(r => { if (!r.ok) throw new Error('data.json 없음'); return r.json(); })
  .then(data => {
    document.getElementById('header-date').textContent = data.updated + ' 기준';

    document.getElementById('s-loss-gen').textContent   = data.summary.loss.이슈생성;
    document.getElementById('s-loss-wait').textContent  = data.summary.loss.이슈대기;
    document.getElementById('s-loss-total').textContent = data.summary.loss.합계;
    document.getElementById('s-dmg-gen').textContent    = data.summary.damage.이슈생성;
    document.getElementById('s-dmg-wait').textContent   = data.summary.damage.이슈대기;
    document.getElementById('s-dmg-total').textContent  = data.summary.damage.합계;

    document.getElementById('loss-count').textContent = data.lossIssues.length + '건';
    renderIssues(data.lossIssues, 'loss-tbody');

    document.getElementById('dmg-count').textContent = data.damageIssues.length + '건';
    renderIssues(data.damageIssues, 'dmg-tbody');

    const ps = data.processStats;
    document.getElementById('process-title').textContent = `처리기간 분석  (${ps.period})  총 ${ps.total}건`;
    document.getElementById('process-stat-cards').innerHTML = ps.stats.map(s => `
      <div class="proc-card">
        <div class="pc-title">${s.상태}</div>
        <div class="pc-row"><span class="k">건수</span><span class="v">${s.건수}</span></div>
        <div class="pc-row"><span class="k">평균 D+</span><span class="v">${s.평균}</span></div>
        <div class="pc-row"><span class="k">최소 D+</span><span class="v">${s.최소}</span></div>
        <div class="pc-row"><span class="k">최대 D+</span><span class="v">${s.최대}</span></div>
      </div>`).join('');
    document.getElementById('process-tbody').innerHTML = ps.stats.map(s =>
      `<tr><td>${badge(s.상태)}</td><td>${s.건수}</td><td>${s.평균}</td><td>${s.최소}</td><td>${s.최대}</td></tr>`
    ).join('') + `<tr><td style="font-weight:600">합계</td><td style="font-weight:600">${ps.total}</td><td colspan="3"></td></tr>`;

    const ct = data.cancelTracking;
    const cel = document.getElementById('cancel-content');
    if (!ct.hasReporter) {
      cel.innerHTML = `<div class="notice-box">Reporter 파일 미제공 — 이슈생성자 정보를 보려면 배치 실행 시 Reporter 파일을 함께 선택해주세요.</div>`;
    } else {
      cel.innerHTML = `
        <div class="table-box">
          <div class="table-box-header">
            <div><span class="t-title">이슈생성자 취소건 집계</span><span class="t-count">${ct.period} · 총 ${ct.total}건</span></div>
          </div>
          <div style="overflow-x:auto">
            <table>
              <thead><tr><th>순위</th><th>이슈생성자</th><th>구분</th><th>취소건수</th></tr></thead>
              <tbody>${ct.summary.map((r, i) => `<tr>
                <td>${i+1}</td><td>${r.이슈생성자}</td>
                <td>${r.구분 === '반장' ? '<span class="badge badge-boss">반장</span>' : r.구분}</td>
                <td><b>${r.취소건수}</b></td>
              </tr>`).join('')}</tbody>
            </table>
          </div>
        </div>`;
    }

    const tl = data.topLoc;
    document.getElementById('loc-title').textContent = `TOP LOC 20  (${tl.period})  대상 ${tl.total}건`;
    const max = tl.rows.length ? tl.rows[0].건수 : 1;
    document.getElementById('loc-bars').innerHTML = tl.rows.map(r => `
      <div class="bar-item">
        <div class="bar-loc" title="${r.로케이션}">${r.로케이션}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.건수/max*100)}%"></div></div>
        <div class="bar-cnt">${r.건수}건</div>
      </div>`).join('');
    document.getElementById('loc-tbody').innerHTML = tl.rows.map(r =>
      `<tr><td>${r.순위}</td><td>${r.로케이션}</td><td><b>${r.건수}</b></td><td style="white-space:normal">${r.SKU목록}</td></tr>`
    ).join('');
  })
  .catch(e => {
    document.querySelector('.content').innerHTML =
      `<div class="error-box">데이터 로딩 실패: ${e.message}<br>배치 파일을 실행하여 데이터를 먼저 생성해주세요.</div>`;
  });
</script>
</body>
</html>
